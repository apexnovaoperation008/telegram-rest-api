services:
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    env_file:
      - .env
    volumes:
      - ./storage:/app/storage
    environment:
      - NODE_TLS_REJECT_UNAUTHORIZED=0

  # Proxies all traffic to the API, except /storage/ which is served directly.
  # Update STORAGE_BASE_URL in .env to the nginx host (e.g. http://<host>).
  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./storage:/storage:ro
    depends_on:
      - api
