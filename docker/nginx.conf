server {
    listen 80;

    # Disable directory listing so scanners cannot enumerate folder contents
    autoindex off;

    # Serve files under /storage/ by exact path only.
    # try_files returns 404 when the file does not exist on disk;
    # no fallback is provided so partial paths or directory names also 404.
    location /storage/ {
        alias /storage/;
        try_files $uri =404;
    }

    # Proxy everything else to the API service
    location / {
        proxy_pass http://api:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
